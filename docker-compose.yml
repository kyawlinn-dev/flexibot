version: "3.8"

services:
  backend:
    build: ./backend
    container_name: flexibot-backend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcloud.json

  admin-dashboard:
    build: ./admin-dashboard
    container_name: flexibot-dashboard
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./admin-dashboard/.env.local
    environment:
      - PORT=3001